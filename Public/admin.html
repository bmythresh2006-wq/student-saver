<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="top-bar">
  🛠 Admin Dashboard
</div>

<div class="admin-container">

  <h2>Add / Edit Product</h2>

  <div class="form">
    <input id="name" placeholder="Product Name">
    <input id="mrp" placeholder="Original Price">
    <input id="price" placeholder="Selling Price">

    <select id="category">
      <option>Instant Food</option>
      <option>Snacks</option>
      <option>Beverages</option>
    </select>

    <input id="image" placeholder="images/product.jpg">

    <button onclick="saveProduct()">Save Product</button>
  </div>

  <h2>Products</h2>

  <input id="adminSearch" placeholder="Search..." onkeyup="searchAdmin()">

  <table>
    <thead>
      <tr>
        <th>Image</th>
        <th>Name</th>
        <th>MRP</th>
        <th>Price</th>
        <th>Category</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

</div>

<!-- EDIT POPUP -->
<div id="editModal" class="modal">
  <div class="modal-box">
    <h3>Edit Product</h3>

    <input id="editName">
    <input id="editMRP">
    <input id="editPrice">

    <select id="editCategory">
      <option>Instant Food</option>
      <option>Snacks</option>
      <option>Beverages</option>
    </select>

    <input id="editImage">

    <button onclick="updateProduct()">Update</button>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script src="admin.js"></script>
</body>
</html>
