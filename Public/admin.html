<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
</head>

<body>

<h2>Add Product</h2>

<input id="name" placeholder="Product Name"><br><br>
<input id="price" placeholder="Price"><br><br>
<input id="category" placeholder="Category"><br><br>
<input id="image" placeholder="Image path (images/maggi.jpg)"><br><br>

<button onclick="addProduct()">Add Product</button>

<h3 id="msg"></h3>

<script>
async function addProduct() {
  const product = {
    name: document.getElementById("name").value,
    price: Number(document.getElementById("price").value),
    category: document.getElementById("category").value,
    image: "/" + document.getElementById("image").value
  };

  await fetch("/api/add-product", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(product)
  });

  document.getElementById("msg").innerText = "Product Added!";
}
</script>

</body>
</html>
