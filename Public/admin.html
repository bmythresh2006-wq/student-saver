<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard - Student Saver</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>

<div class="container">
  <h1>🛠 Admin Dashboard</h1>

  <!-- Add Product -->
  <div class="card">
    <h2>Add / Edit Product</h2>

    <input id="name" placeholder="Product Name">
    <input id="original" placeholder="Original Price" type="number">
    <input id="selling" placeholder="Selling Price" type="number">

    <select id="category">
      <option>Snacks</option>
      <option>Stationery</option>
      <option>Drinks</option>
    </select>

    <input type="file" id="image">

    <button onclick="addProduct()">Save Product</button>
  </div>

  <!-- Product List -->
  <div class="card">
    <h2>All Products</h2>
    <div id="productList"></div>
  </div>

</div>

<script src="admin.js"></script>
</body>
</html>
