<!DOCTYPE html>
<html>
<head>
  <title>Student Saver Delivery</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header style="background:#10b981;color:white;padding:15px;font-size:20px;">
  Student Saver Delivery — Lower than MRP
</header>

<!-- CATEGORY -->
<div id="categories" style="padding:10px;">
  <span>All</span>
</div>

<!-- SEARCH -->
<input id="search" placeholder="Search products..." style="width:100%;padding:10px;margin:10px 0;" />

<!-- PRODUCTS -->
<div id="product-list" style="display:flex;gap:15px;flex-wrap:wrap;padding:10px;"></div>

<!-- CART -->
<div class="cart-box" style="position:fixed;bottom:0;width:100%;background:green;color:white;padding:10px;">
  🛒 Total ₹<span id="total">0</span>
  <button style="float:right;">Checkout</button>
</div>

<!-- SCRIPT -->
<script>
async function loadProducts() {
  const res = await fetch("/api/products");
  const products = await res.json();

  const container = document.getElementById("product-list");
  container.innerHTML = "";

  products.forEach(product => {
    const discount = product.originalPrice
      ? Math.round(((product.originalPrice - product.price) / product.originalPrice) * 100)
      : 0;

    const card = document.createElement("div");
    card.style = "border:1px solid #ddd;padding:10px;border-radius:10px;width:180px";

    card.innerHTML = `
      <div style="background:green;color:white;padding:3px 6px;font-size:12px;">
        ${discount}% OFF
      </div>
      <img src="${product.image}" width="100%">
      <h3>${product.name}</h3>
      <p>₹${product.price}</p>
      <p style="text-decoration:line-through;color:red;">
        ₹${product.originalPrice || ""}
      </p>
      <button>Add</button>
    `;

    container.appendChild(card);
  });

  // categories
  const categories = [...new Set(products.map(p => p.category))];
  const catDiv = document.getElementById("categories");

  catDiv.innerHTML = "<span>All</span> " +
    categories.map(c => `<span style="margin-left:10px;">${c}</span>`).join("");
}

loadProducts();
</script>

</body>
</html>
