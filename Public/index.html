<!DOCTYPE html>
<html>
<head>
  <title>Student Saver</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔝 Top bar -->
<div class="top-bar">
  <span>🛒 ₹<span id="total">0</span></span>
  <button onclick="openCheckout()">Checkout</button>
</div>

<h2 style="padding:10px;">Student Saver Delivery</h2>

<input id="search" placeholder="Search products..." onkeyup="searchProduct()">

<div id="categories"></div>

<div id="products"></div>

<!-- 🧾 CHECKOUT MODAL -->
<div id="checkoutModal" class="modal">
  <div class="modal-content">
    <h2>Checkout</h2>

    <div id="orderSummary"></div>

    <h3>Total ₹<span id="finalTotal"></span></h3>

    <button onclick="payUPI()">Pay via PhonePe / UPI</button>

    <button onclick="closeCheckout()">Close</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
