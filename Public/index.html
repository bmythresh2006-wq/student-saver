<!DOCTYPE html>
<html>
<head>
  <title>Student Saver Delivery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 🔥 TOP BAR -->
<div style="background: green; color: white; padding: 10px; display:flex; justify-content: space-between;">
  <div>🛒 ₹</div>
  <div>Cart: <span id="cartCount">0</span></div>
  <button onclick="goToCheckout()">Checkout</button>
</div>

<h1>Student Saver Delivery</h1>

<!-- 🔍 SEARCH -->
<input id="search" onkeyup="searchProducts()" placeholder="Search products..." style="width:100%; padding:10px;">

<!-- 🧩 CATEGORIES -->
<div style="margin:10px 0;">
  <button onclick="filterCategory('All')">All</button>
  <button onclick="filterCategory('Snacks')">Snacks</button>
  <button onclick="filterCategory('Drinks')">Drinks</button>
  <button onclick="filterCategory('Stationery')">Stationery</button>
</div>

<!-- 📦 PRODUCTS -->
<div id="products" style="display:flex; gap:20px; flex-wrap:wrap;"></div>

<script src="script.js"></script>

</body>
</html>
