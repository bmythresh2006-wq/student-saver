<!DOCTYPE html>
<html>
<head>
  <title>Student Saver Delivery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header class="top">
  Student Saver Delivery — Lower than MRP
</header>

<!-- CATEGORY TABS -->
<div id="tabs"></div>

<!-- SEARCH -->
<input id="search" placeholder="Search products..." />

<!-- PRODUCTS -->
<div id="app"></div>

<!-- STICKY CART BAR -->
<div id="cartBar">
  🛒 ₹<span id="total">0</span>
  <button onclick="checkout()">Checkout</button>
</div>

<!-- PAYMENT BOX -->
<div id="paymentBox" style="display:none;">
  <h2>Pay via UPI / PhonePe</h2>

  <p><strong>PhonePe Number:</strong> 8074923471</p>
  <p><strong>UPI ID:</strong> yourname@upi</p>

  <img src="qr.png" width="200"/>

  <!-- ORDER SUMMARY -->
  <div id="orderSummary"></div>

  <p>Total Amount: ₹<span id="payAmount"></span></p>

  <p>After payment, upload screenshot:</p>
  <input type="file" id="proof" />

  <br><br>
  <button onclick="submitOrder()">Submit Payment</button>
</div>

<!-- MESSAGE -->
<p id="message"></p>

<script src="script.js"></script>

</body>
</html>
